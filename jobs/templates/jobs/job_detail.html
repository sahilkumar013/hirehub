{% extends 'jobs/base.html' %}

{% block content %}
    <h2>{{ job.title }}</h2>

    <p><strong>Company:</strong> {{ job.company }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <p><strong>Salary:</strong> ₹{{ job.salary }}</p>
    <p><strong>Posted:</strong> {{ job.posted_at }}</p>

    <hr>
    <p>{{ job.description }}</p>

    <a href="/">⬅ Back to Jobs</a>
{% endblock %}
